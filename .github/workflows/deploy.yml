name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Actualizado de '18' a '20' para compatibilidad con Vite v7
          node-version: '20' 

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build project
        run: npm run build
        working-directory: ./

      - name: Deploy to GitHub Pages
        # Actualizado a v4 para mejor soporte
        uses: peaceiris/actions-gh-pages@v4 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist